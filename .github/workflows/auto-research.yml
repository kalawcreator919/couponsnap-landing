name: CouponSnap Auto Research

on:
  schedule:
    # Run daily at 9:00 AM UTC (5:00 PM HKT)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  experiment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install google-analytics-data cryptography

      - name: Run Auto Research Pipeline
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_CREDENTIALS: ${{ secrets.GA4_CREDENTIALS }}
        run: |
          cd auto-research
          python orchestrator.py

      - name: Commit to dev branch
        id: commit
        run: |
          git config user.name "CouponSnap Auto Research"
          git config user.email "auto-research@couponsnap.app"
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            EXPERIMENT_ID=$(date +%Y%m%d-%H%M)
            git commit -m "auto-research: experiment ${EXPERIMENT_ID}"
            git push origin dev
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "experiment_id=${EXPERIMENT_ID}" >> $GITHUB_OUTPUT
          fi

      - name: Create or update PR (dev → main)
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXPERIMENT_ID="${{ steps.commit.outputs.experiment_id }}"
          EXISTING_PR=$(gh pr list --base main --head dev --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} already exists"
            gh pr comment "${EXISTING_PR}" --body "Auto-research experiment ${EXPERIMENT_ID} committed to dev."
          else
            gh pr create \
              --base main \
              --head dev \
              --title "auto-research: CRO experiments batch" \
              --body "Auto-generated by CouponSnap Auto Research pipeline."
          fi
